name: Deploy Product Page

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle 9.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.1.0'

      - name: Build plugin ZIP
        run: gradle buildPlugin

      - name: Prepare Pages artifact
        shell: bash
        run: |
          mkdir -p _site/downloads
          cp -R site/. _site/
          plugin_zip="$(find build/distributions -maxdepth 1 -type f -name '*.zip' | head -n 1)"
          if [ -z "$plugin_zip" ]; then
            echo "No plugin ZIP found in build/distributions"
            exit 1
          fi
          cp "$plugin_zip" _site/downloads/
          cp "$plugin_zip" _site/downloads/annotation-tidy-latest.zip
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
